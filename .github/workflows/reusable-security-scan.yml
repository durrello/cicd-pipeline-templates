name: Reusable - Security Scan

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name to scan (built earlier in the pipeline)"
        type: string
        required: true
      scan-ref:
        description: "Filesystem path to scan for secrets/vulns"
        type: string
        default: "."

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  vuln-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-ref }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
