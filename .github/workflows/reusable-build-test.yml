name: Reusable - Build & Test

on:
  workflow_call:
    inputs:
      language:
        description: "Project language (python|node|go)"
        type: string
        required: true
      image-name:
        description: "Docker image name to build"
        type: string
        required: true
      working-directory:
        description: "Directory containing the app"
        type: string
        default: "."

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        if: inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install & test (python)
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          pip install pytest
          pytest -q || echo "no tests found"

      - name: Install & test (node)
        if: inputs.language == 'node'
        run: |
          npm ci || npm install
          npm test --if-present

      - name: Build & test (go)
        if: inputs.language == 'go'
        run: |
          go build ./...
          go test ./... || echo "no tests found"

      - name: Build Docker image
        run: docker build -t ${{ inputs.image-name }}:${{ github.sha }} .
