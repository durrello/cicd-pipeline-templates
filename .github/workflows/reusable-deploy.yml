name: Reusable - Deploy

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
      environment:
        description: "Target environment (staging|production)"
        type: string
        default: "staging"
    secrets:
      KUBE_CONFIG:
        description: "Base64-encoded kubeconfig for the target cluster"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        if: ${{ secrets.KUBE_CONFIG != '' }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.image-name }}:${{ github.sha }} to ${{ inputs.environment }}"
          # Uncomment once KUBE_CONFIG is configured:
          # kubectl set image deployment/${{ inputs.image-name }} \
          #   ${{ inputs.image-name }}=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
          # kubectl rollout status deployment/${{ inputs.image-name }}
          echo "Deploy placeholder complete (wire to your cluster to enable)."
